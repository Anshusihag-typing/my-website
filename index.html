<!DOCTYPE html>
<html>
<head>
    <title>AC Service Company</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #121212;
            color: white;
        }

        header {
            background: #000;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #00e5ff;
        }

        nav {
            text-align: center;
            padding: 10px;
            background: #1e1e1e;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        input, textarea {
            width: 250px;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #00e5ff;
            border: none;
            cursor: pointer;
        }

        footer {
            background: black;
            text-align: center;
            padding: 10px;
        }
    </style>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script>
        (function(){
            emailjs.init("YOUR_PUBLIC_KEY"); // yahan apni key daalni hai
        })();

        function sendMail(event) {
            event.preventDefault();

            emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
                from_name: document.getElementById("name").value,
                message: document.getElementById("message").value,
                reply_to: document.getElementById("email").value,
            }).then(function(){
                alert("Complaint Sent Successfully ✅");
            }, function(error){
                alert("Error: " + JSON.stringify(error));
            });
        }
    </script>

</head>

<body>

<header>
    <h1>Cool Air AC Service ❄️</h1>
    <p>Fast AC Repair & Service</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Complaint</a>
</nav>

<section>
    <h2>Welcome</h2>
    <p>We provide professional AC repair and maintenance services.</p>
</section>

<section class="services">
    <div class="box">
        <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
        <h3>AC Repair</h3>
    </div>

    <img src="https://images.unsplash.com/photo-1598514982901-1c6b7c6b?auto=format&fit=crop&w=400&q=80">

    <div class="box">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
        <h3>Gas Filling</h3>
    </div>
</section>

<section>
    <h2>Register Complaint</h2>

    <form onsubmit="sendMail(event)">
        <input type="text" id="name" placeholder="Your Name" required><br>
        <input type="email" id="email" placeholder="Your Email" required><br>
        <textarea id="message" placeholder="Your Complaint" required></textarea><br>
        <button type="submit">Send Complaint</button>
    </form>
</section>

<footer>
    <p>© 2026 AC Service Company</p>
</footer>

</body>
</html>
