<!DOCTYPE html>
<html>
<head>
    <title>AC Service Company</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #121212;
            color: white;
        }

        header {
            background: #1f1f1f;
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        /* Buttons */
        .top-buttons {
            text-align: center;
            margin: 15px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .call-btn {
            background: #007bff;
        }

        .whatsapp-btn {
            background: #25D366;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Services */
        .service-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .service-box {
            background: #1e1e1e;
            padding: 15px;
            margin: 15px;
            border-radius: 12px;
            text-align: center;
            width: 260px;
            transition: 0.3s;
        }

        .service-box:hover {
            transform: scale(1.05);
        }

        .service-box img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 10px;
        }

        .service-box h2 {
            margin: 10px 0;
        }

        .service-box p {
            font-size: 14px;
        }

        footer {
            background: #1f1f1f;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    AC Service Company
</header>

<!-- Buttons -->
<div class="top-buttons">
    <a href="tel:9876543210" class="btn call-btn">📞 Call Now</a>
    <a href="https://wa.me/919876543210" class="btn whatsapp-btn">💬 WhatsApp</a>
</div>

<!-- Services -->
    <div id="service-details" style="text-align:center; padding:20px;">
    <h2>Select a service to see details</h2>
</div>
<div class="service-container">

    <div class="service-box" onclick="showService('repair')">
        <h2>AC Repair</h2>
        <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
    </div>

    <div class="service-box" onclick="showService('install')">
        <h2>AC Installation</h2>
        <img src="https://images.unsplash.com/photo-1590650153855-d9e808231d41">
    </div>

    <div class="service-box" onclick="showService('service')">
        <h2>AC Service</h2>
        <img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4">
    </div>

    <div class="service-box" onclick="showService('gas')">
        <h2>Gas Filling</h2>
        <img src="https://images.unsplash.com/photo-1604335399105-a0c585fd81a1">
    </div>

</div>

<footer>
    © 2026 AC Service Company | All Rights Reserved
</footer>

<!-- Your HTML content above -->

<div id="service-details"></div>

<!-- ✅ JavaScript goes here -->
<script>
function showService(type) {
    let content = "";

    if(type === "repair") {
        content = "<h2>AC Repair</h2><p>We fix cooling issues, noise problems, and all AC faults.</p>";
    }

    else if(type === "install") {
        content = "<h2>AC Installation</h2><p>Professional AC installation with proper setup.</p>";
    }

    else if(type === "service") {
        content = "<h2>AC Service</h2><p>Complete cleaning using water pressure.</p>";
    }

    else if(type === "gas") {
        content = "<h2>Gas Filling</h2><p>Accurate gas refill for better cooling.</p>";
    }

    document.getElementById("service-details").innerHTML = content;
}
</script>

</body>
</html>
</body>
</html>
